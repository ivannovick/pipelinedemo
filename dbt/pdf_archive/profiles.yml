# Credentials from environment (Compose sets these for the Airflow container).
pdf_archive:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      user: "{{ env_var('POSTGRES_USER', 'pdfuser') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'pdfpass') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'pdfarchive') }}"
      schema: dbt_analytics
      threads: 4
